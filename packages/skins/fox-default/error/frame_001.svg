<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- 背景：透明 -->
      <rect width="200" height="200" fill="none"/>

      <!-- 身体 - 根据状态调整 -->
      
    <ellipse cx="100" cy="110" rx="60" ry="55" fill="#FF8C42" transform="scale(1.025)"/>
    <ellipse cx="100" cy="115" rx="50" ry="40" fill="#E67E22" transform="scale(1.025)"/>
  

      <!-- 肚子 -->
      
    <ellipse cx="100" cy="125" rx="40" ry="30" fill="#FFE4B5" transform="scale(1.015)"/>
  

      <!-- 耳朵 -->
      
    <!-- 左耳 -->
    <ellipse cx="55" cy="60" rx="18" ry="25" fill="#FF8C42"
            transform="rotate(-6.3397459621556145deg, 55, 70)"/>
    <ellipse cx="55" cy="63" rx="10" ry="15" fill="#FFB6C1"
            transform="rotate(-6.3397459621556145deg, 55, 70)"/>

    <!-- 右耳 -->
    <ellipse cx="145" cy="60" rx="18" ry="25" fill="#FF8C42"
            transform="rotate(6.3397459621556145deg, 145, 70)"/>
    <ellipse cx="145" cy="63" rx="10" ry="15" fill="#FFB6C1"
            transform="rotate(6.3397459621556145deg, 145, 70)"/>
  

      <!-- 眼睛 -->
      
    <!-- 左眼外圈 -->
    <ellipse cx="80" cy="95" rx="12" ry="15" fill="white"/>
    
      <!-- 左眼球 -->
      <circle cx="80" cy="95" r="6" fill="#2C3E50"/>
      <!-- 左眼高光 -->
      <circle cx="78" cy="93" r="2" fill="#FFFFFF"/>
    

    <!-- 右眼外圈 -->
    <ellipse cx="120" cy="95" rx="12" ry="15" fill="white"/>
    
      <!-- 右眼球 -->
      <circle cx="120" cy="95" r="6" fill="#2C3E50"/>
      <!-- 右眼高光 -->
      <circle cx="118" cy="93" r="2" fill="#FFFFFF"/>
    
  

      <!-- 鼻子 -->
      
    <ellipse cx="100" cy="110" rx="6" ry="5" fill="#FF6B6B" transform="scale(1.029552020666134)"/>
  

      <!-- 腮红 -->
      
    <ellipse cx="70" cy="115" rx="8" ry="5" fill="#FFB347" opacity="0.7397338661590122"/>
    <ellipse cx="130" cy="115" rx="8" ry="5" fill="#FFB347" opacity="0.7397338661590122"/>
  

      <!-- 嘴巴 -->
      <path d="M 90 122 Q 100 118 110 122" stroke="#8B7355" stroke-width="2" fill="none"/>

      <!-- 胡须 -->
      
    <!-- 左侧胡须 -->
    <line x1="50" y1="105" x2="20" y2="101.43827661581261" stroke="#8B7355" stroke-width="2" opacity="0.6886560619984018"/>
    <line x1="50" y1="110" x2="20" y2="111.43827661581261" stroke="#8B7355" stroke-width="2" opacity="0.6886560619984018"/>
    <line x1="50" y1="115" x2="20" y2="116.43827661581261" stroke="#8B7355" stroke-width="2" opacity="0.6886560619984018"/>

    <!-- 右侧胡须 -->
    <line x1="150" y1="105" x2="180" y2="101.43827661581261" stroke="#8B7355" stroke-width="2" opacity="0.6886560619984018"/>
    <line x1="150" y1="110" x2="180" y2="111.43827661581261" stroke="#8B7355" stroke-width="2" opacity="0.6886560619984018"/>
    <line x1="150" y1="115" x2="180" y2="116.43827661581261" stroke="#8B7355" stroke-width="2" opacity="0.6886560619984018"/>
  

      <!-- 特效 -->
      
        <!-- 泪水 -->
        
          <ellipse cx="65" cy="115" rx="3" ry="4" fill="rgba(100, 149, 237, 0.7397127693021015)"/>
        

        

        <!-- 暗淡覆盖 -->
        <rect x="0" y="0" width="200" height="200" fill="rgba(0,0,0,0.6408959586677321)" opacity="0.3"/>
      
    </svg>