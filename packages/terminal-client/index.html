<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      height: 100%;
    }
    .terminal-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .terminal-output {
      flex: 1;
      overflow: hidden;
    }
    .terminal-output .xterm {
      height: 100%;
      padding: 12px;
    }
    .terminal-input-line {
      display: flex;
      padding: 8px 12px;
      background: #2d2d2d;
      align-items: center;
    }
    .prompt {
      color: #569cd6;
      margin-right: 8px;
      font-weight: bold;
    }
    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #d4d4d4;
      font-family: inherit;
      font-size: inherit;
      outline: none;
    }
    .session-info {
      padding: 8px 12px;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      font-size: 12px;
      color: #888;
    }
    .session-info span {
      margin-right: 16px;
    }
    .session-info .pid {
      color: #569cd6;
    }
    .session-info .status {
      color: #4ec9b0;
    }
    .session-info .status.exited {
      color: #f14c4c;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
