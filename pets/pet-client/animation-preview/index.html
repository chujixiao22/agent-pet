<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00d4ff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px;
      background: #16213e;
      border-radius: 10px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: #aaa;
    }

    select {
      padding: 8px 12px;
      border: 1px solid #00d4ff;
      border-radius: 5px;
      background: #0f3460;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    select:hover {
      background: #1a4a7a;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      background: #00d4ff;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #00a8cc;
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    button.playing {
      background: #ff6b6b;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }

    .frame-display {
      width: 200px;
      height: 200px;
      margin: 0 auto 20px;
      border: 2px solid #00d4ff;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Checkerboard pattern for transparency */
      background-image:
        linear-gradient(45deg, #333 25%, transparent 25%),
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #222;
    }

    .frame-display img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .frame-display .placeholder {
      color: #888;
      font-size: 14px;
      text-align: center;
    }

    .frame-info {
      text-align: center;
      margin-bottom: 20px;
      font-size: 18px;
      color: #00d4ff;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      width: 120px;
      height: 6px;
      -webkit-appearance: none;
      background: #0f3460;
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #00d4ff;
      border-radius: 50%;
      cursor: pointer;
    }

    .fps-value {
      min-width: 50px;
      text-align: center;
      color: #00d4ff;
      font-weight: bold;
    }

    .thumbnail-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 15px;
      background: #16213e;
      border-radius: 10px;
      min-height: 80px;
    }

    .thumbnail {
      width: 60px;
      height: 60px;
      border: 2px solid transparent;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f3460;
      padding: 5px;
    }

    .thumbnail:hover {
      border-color: #00d4ff;
      transform: scale(1.1);
    }

    .thumbnail.active {
      border-color: #ff6b6b;
      background: #1a4a7a;
    }

    .thumbnail img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .thumbnail .frame-num {
      font-size: 12px;
      color: #888;
    }

    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
      }

      .frame-display {
        width: 150px;
        height: 150px;
      }
    }

    /* CSS Animation Keyframes */
    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.03) translateY(-3px); }
    }

    @keyframes tailWag {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(8deg); }
    }

    @keyframes blink {
      0%, 45%, 55%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }

    @keyframes sad {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(5px) rotate(-3deg); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* State-specific animations */
    .frame-display.idle img,
    .frame-display.idle_long img {
      animation: breathe 3s ease-in-out infinite;
    }

    .frame-display.idle_long img {
      animation: breathe 4s ease-in-out infinite;
    }

    .frame-display.working img {
      animation: breathe 1.5s ease-in-out infinite;
    }

    .frame-display.thinking img {
      animation: wobble 2s ease-in-out infinite;
    }

    .frame-display.success img {
      animation: bounce 0.8s ease-in-out infinite;
    }

    .frame-display.error img {
      animation: sad 3s ease-in-out infinite;
    }

    /* Decorative sparkle for success state */
    .frame-display.success::before {
      content: '✨';
      position: absolute;
      font-size: 24px;
      top: 10px;
      right: 10px;
      animation: sparkle 1.5s ease-in-out infinite;
      opacity: 1;
    }

    .frame-display::before {
      content: '✨';
      position: absolute;
      font-size: 24px;
      top: 10px;
      right: 10px;
      animation: sparkle 1.5s ease-in-out infinite;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Animation Preview</h1>

    <div class="controls">
      <div class="control-group">
        <label for="stateSelect">State:</label>
        <select id="stateSelect">
          <option value="idle">idle</option>
          <option value="idle_long">idle_long</option>
          <option value="working">working</option>
          <option value="thinking">thinking</option>
          <option value="success">success</option>
          <option value="error">error</option>
        </select>
      </div>

      <div class="control-group">
        <button id="prevBtn" disabled>&lt; Prev</button>
        <button id="playBtn" disabled>Play</button>
        <button id="nextBtn" disabled>Next &gt;</button>
      </div>

      <div class="control-group slider-container">
        <label for="fpsSlider">FPS:</label>
        <input type="range" id="fpsSlider" min="1" max="24" value="10">
        <span class="fps-value" id="fpsValue">10</span>
      </div>
    </div>

    <div class="frame-display" id="frameDisplay">
      <div class="placeholder" id="placeholder">等待帧生成...</div>
      <img id="frameImage" style="display: none;" alt="Animation Frame">
    </div>

    <div class="frame-info">
      Frame: <span id="currentFrame">0</span> / <span id="totalFrames">0</span>
    </div>

    <div class="thumbnail-list" id="thumbnailList">
      <!-- Thumbnails will be generated here -->
    </div>
  </div>

  <script>
    // State configuration (consistent with animation_manifest.json)
    const states = {
      idle: { frameCount: 12, duration: 100 },
      idle_long: { frameCount: 8, duration: 250 },
      working: { frameCount: 10, duration: 100 },
      thinking: { frameCount: 9, duration: 130 },
      success: { frameCount: 8, duration: 80 },
      error: { frameCount: 10, duration: 150 }
    };

    // Current state
    let currentState = 'idle';
    let currentFrameIndex = 0;
    let isPlaying = false;
    let playInterval = null;
    let fps = 10;
    let frames = [];

    // DOM elements
    const stateSelect = document.getElementById('stateSelect');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const fpsSlider = document.getElementById('fpsSlider');
    const fpsValue = document.getElementById('fpsValue');
    const frameDisplay = document.getElementById('frameDisplay');
    const frameImage = document.getElementById('frameImage');
    const placeholder = document.getElementById('placeholder');
    const currentFrameEl = document.getElementById('currentFrame');
    const totalFramesEl = document.getElementById('totalFrames');
    const thumbnailList = document.getElementById('thumbnailList');

    // Load frames for a given state (loads frame_001.png sequence)
    async function loadFrames(state) {
      const config = states[state];
      if (!config) return;

      const frameCount = config.frameCount || 8;
      frames = [];

      // Try to load frame sequence
      for (let i = 1; i <= frameCount; i++) {
        const framePath = `frames/${state}/frame_${String(i).padStart(3, '0')}.png`;
        try {
          const response = await fetch(framePath);
          if (response.ok) {
            frames.push({ path: framePath, num: i });
          }
        } catch {
          // Frame not available, skip
        }
      }

      if (frames.length > 0) {
        // Set state class for CSS animations
        frameDisplay.className = `frame-display ${state}`;
        placeholder.style.display = 'none';

        totalFramesEl.textContent = frames.length;
        renderThumbnails();
        showFrame(0);

        // Enable playback controls
        playBtn.disabled = false;
        prevBtn.disabled = false;
        nextBtn.disabled = false;
} else {
        // No frames available, show placeholder
        placeholder.style.display = 'block';
        placeholder.textContent = '无帧可用';
        frameImage.style.display = 'none';
        currentFrameEl.textContent = '0';
        totalFramesEl.textContent = '0';
        thumbnailList.innerHTML = '<div class="frame-num">无可用帧</div>';
        playBtn.disabled = true;
        prevBtn.disabled = true;
        nextBtn.disabled = true;
      }
    }

    // Render thumbnail list
    function renderThumbnails() {
      thumbnailList.innerHTML = '';

      if (frames.length === 0) {
        thumbnailList.innerHTML = '<div class="frame-num">无帧可用</div>';
        return;
      }

      frames.forEach((frame, index) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumbnail' + (index === currentFrameIndex ? ' active' : '');
        thumb.innerHTML = `<img src="${frame.path}" alt="Frame ${index + 1}">`;
        thumb.onclick = () => goToFrame(index);
        thumbnailList.appendChild(thumb);
      });
    }

    // Show specific frame
    function showFrame(index) {
      if (frames.length === 0) {
        placeholder.style.display = 'block';
        frameImage.style.display = 'none';
        currentFrameEl.textContent = '0';
        return;
      }

      // Clamp index
      if (index < 0) index = 0;
      if (index >= frames.length) index = frames.length - 1;

      currentFrameIndex = index;
      const frame = frames[index];

      placeholder.style.display = 'none';
      frameImage.style.display = 'block';
      frameImage.src = frame.path;
      currentFrameEl.textContent = index + 1;

      // Update thumbnail active state
      document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
        thumb.classList.toggle('active', i === index);
      });
    }

    // Go to specific frame
    function goToFrame(index) {
      stopPlayback();
      showFrame(index);
    }

    // Play/Pause toggle
    function togglePlayback() {
      if (isPlaying) {
        stopPlayback();
      } else {
        startPlayback();
      }
    }

    function startPlayback() {
      if (frames.length === 0) return;

      isPlaying = true;
      playBtn.textContent = 'Pause';
      playBtn.classList.add('playing');

      const interval = 1000 / fps;
      playInterval = setInterval(() => {
        currentFrameIndex = (currentFrameIndex + 1) % frames.length;
        showFrame(currentFrameIndex);
      }, interval);
    }

    function stopPlayback() {
      isPlaying = false;
      playBtn.textContent = 'Play';
      playBtn.classList.remove('playing');

      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
      }
    }

    // Update FPS
    function updateFps(newFps) {
      fps = newFps;
      fpsValue.textContent = fps;

      // If playing, restart with new FPS
      if (isPlaying) {
        stopPlayback();
        startPlayback();
      }
    }

    // Event listeners
    stateSelect.addEventListener('change', (e) => {
      stopPlayback();
      currentState = e.target.value;
      currentFrameIndex = 0;
      loadFrames(currentState);
    });

    playBtn.addEventListener('click', togglePlayback);

    prevBtn.addEventListener('click', () => {
      stopPlayback();
      showFrame(currentFrameIndex - 1);
    });

    nextBtn.addEventListener('click', () => {
      stopPlayback();
      showFrame(currentFrameIndex + 1);
    });

    fpsSlider.addEventListener('input', (e) => {
      updateFps(parseInt(e.target.value));
    });

    // Initial load
    loadFrames(currentState);
  </script>
</body>
</html>
