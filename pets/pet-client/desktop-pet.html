<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 200px;
      height: 200px;
      background: transparent;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-app-region: drag;
    }
    #pet-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: transparent;
    }
    #pet-image {
      width: 100%;
      height: 100%;
      animation: float 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1) translateY(-20px); }
      50% { transform: scale(1.05) translateY(-15px); }
      75% { transform: scale(1.1) translateY(-20px); }
    }
    @keyframes working {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(5px); }
      50% { transform: translateX(0); }
      75% { transform: translateX(-5px); }
    }
    @keyframes thinking {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(8deg); }
    }
    .bounce { animation: bounce 0.6s ease-in-out infinite; }
    .working { animation: working 0.4s ease-in-out infinite; }
    .thinking { animation: thinking 0.6s ease-in-out infinite; }

    #message {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      pointer-events: none;
    }
    #message.show { opacity: 1; }

    #context-menu {
      position: fixed;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 8px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
      z-index: 9999;
      display: none;
      font-size: 14px;
    }
    #context-menu.show { display: block; }
    .menu-item {
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 6px;
      margin: 4px 0;
    }
    .menu-item:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <img id="pet-image" src="sprites/idle/frame_001.svg" alt="Pet"/>
    <div id="message">🦊 Hello!</div>
  </div>

  <div id="context-menu">
    <div class="menu-item" onclick="hidePet()">隐藏宠物</div>
    <div class="menu-item" onclick="exitPet()">退出</div>
  </div>

  <script>
    const petImage = document.getElementById('pet-image');
    const message = document.getElementById('message');
    const contextMenu = document.getElementById('context-menu');

    const states = {
      'idle': { frames: 12, duration: 100, path: 'sprites/idle/frame_00' },
      'idle_long': { frames: 8, duration: 250, path: 'sprites/idle_long/frame_00' },
      'working': { frames: 10, duration: 100, path: 'sprites/working/frame_00', animClass: 'working' },
      'thinking': { frames: 9, duration: 130, path: 'sprites/thinking/frame_00', animClass: 'thinking' },
      'success': { frames: 8, duration: 80, path: 'sprites/success/frame_00', animClass: 'bounce' },
      'error': { frames: 10, duration: 150, path: 'sprites/error/frame_00' }
    };

    const stateNames = Object.keys(states);
    const statusMessages = {
      'idle': '...',
      'working': 'Working! 💪',
      'thinking': 'Hmm... 🤔',
      'success': 'Yay! 🎉',
      'idle_long': 'Zzz... 💤',
      'error': 'Oops! 😢'
    };

    let currentStatus = 0;
    let frameIndex = 1;
    let frameInterval = null;
    let statusInterval = null;

    function changeStatus(newState) {
      if (frameInterval) clearInterval(frameInterval);

      const stateConfig = states[newState];
      petImage.src = stateConfig.path + '1.svg';

      petImage.classList.remove('bounce', 'working', 'thinking');

      if (stateConfig.animClass) {
        petImage.classList.add(stateConfig.animClass);
      }

      frameIndex = 1;
      frameInterval = setInterval(() => {
        frameIndex = (frameIndex % stateConfig.frames) + 1;
        const frameNum = frameIndex.toString().padStart(3, '0');
        petImage.src = stateConfig.path + frameNum + '.svg';
      }, stateConfig.duration);

      message.textContent = statusMessages[newState];
      message.classList.add('show');

      setTimeout(() => message.classList.remove('show'), 2000);

      console.log('状态:', newState, '帧:', frameIndex, '/', stateConfig.frames);
    }

    changeStatus('idle');

    statusInterval = setInterval(() => {
      currentStatus = (currentStatus + 1) % stateNames.length;
      changeStatus(stateNames[currentStatus]);
    }, 4000);

    document.getElementById('pet-container').addEventListener('click', () => {
      message.textContent = '❤️ Love you!';
      message.classList.add('show');
      setTimeout(() => {
        message.textContent = statusMessages[stateNames[currentStatus]];
        message.classList.remove('show');
      }, 1500);
    });

    document.getElementById('pet-container').addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation();

      contextMenu.style.left = e.clientX + 'px';
      contextMenu.style.top = e.clientY + 'px';
      contextMenu.classList.add('show');

      setTimeout(() => {
        document.addEventListener('click', closeMenu);
      }, 0);
    });

    function closeMenu() {
      contextMenu.classList.remove('show');
      document.removeEventListener('click', closeMenu);
    }

    function hidePet() {
      console.log('隐藏宠物');
      closeMenu();
    }

    function exitPet() {
      closeMenu();
      message.textContent = 'Bye! 👋';
      message.classList.add('show');
      setTimeout(() => {
        window.close();
      }, 1000);
    }

    console.log('🦊 桌面悬浮宠物已就绪！');
  </script>
</body>
</html>
