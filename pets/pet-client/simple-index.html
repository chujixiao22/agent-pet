<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 180px;
      height: 180px;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #pet {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .pet-sprite {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: #FF8C42;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: breathe 2s ease-in-out infinite;
    }
    .pet-sprite::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 30px;
      width: 15px;
      height: 25px;
      background: #FF8C42;
      border-radius: 50%;
      transform: rotate(-20deg);
    }
    .pet-sprite::after {
      content: '';
      position: absolute;
      top: 20px;
      right: 30px;
      width: 15px;
      height: 25px;
      background: #FF8C42;
      border-radius: 50%;
      transform: rotate(20deg);
    }
    .eyes {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }
    .eye {
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      position: relative;
    }
    .eye::after {
      content: '';
      position: absolute;
      top: 5px;
      left: 5px;
      width: 10px;
      height: 10px;
      background: black;
      border-radius: 50%;
    }
    .mouth {
      width: 30px;
      height: 15px;
      border-bottom: 3px solid black;
      border-radius: 0 0 15px 15px;
    }
    .message {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .message.show {
      opacity: 1;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes happy {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes working {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    .pet-sprite.happy {
      animation: happy 0.5s ease-in-out infinite;
    }
    .pet-sprite.working {
      animation: working 0.3s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="pet">
    <div class="pet-sprite" id="petSprite">
      <div class="eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
      <div class="mouth"></div>
    </div>
    <div class="message" id="message">Hello!</div>
  </div>
  <script src="simple-renderer.js"></script>
</body>
</html>
