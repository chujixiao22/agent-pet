<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      font-family: Arial, sans-serif;
    }
    #pet-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 200px;
      height: 200px;
      cursor: pointer;
      z-index: 1000;
    }
    #pet-image {
      width: 100%;
      height: 100%;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1) translateY(-20px); }
      50% { transform: scale(1.05) translateY(-15px); }
      75% { transform: scale(1.1) translateY(-20px); }
    }
    @keyframes working {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(5px); }
      50% { transform: translateX(0); }
      75% { transform: translateX(-5px); }
    }
    @keyframes thinking {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(8deg); }
    }
    .bounce { animation: bounce 0.6s ease-in-out infinite; }
    .working { animation: working 0.4s ease-in-out infinite; }
    .thinking { animation: thinking 0.6s ease-in-out infinite; }
    .message {
      position: absolute;
      top: -55px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 14px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .message.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="pet-container">
    <img id="pet-image" src="/sprites/idle/frame_001.svg" alt="Pet"/>
    <div class="message" id="message">🦊 Enhanced!</div>
  </div>

  <script>
    const petImage = document.getElementById('pet-image');
    const message = document.getElementById('message');

    const states = {
      'idle': {
        frames: 12,
        duration: 100,
        path: '/sprites/idle/frame_00'
      },
      'idle_long': {
        frames: 8,
        duration: 250,
        path: '/sprites/idle_long/frame_00'
      },
      'working': {
        frames: 10,
        duration: 100,
        path: '/sprites/working/frame_00',
        animClass: 'working'
      },
      'thinking': {
        frames: 9,
        duration: 130,
        path: '/sprites/thinking/frame_00',
        animClass: 'thinking'
      },
      'success': {
        frames: 8,
        duration: 80,
        path: '/sprites/success/frame_00',
        animClass: 'bounce'
      },
      'error': {
        frames: 10,
        duration: 150,
        path: '/sprites/error/frame_00'
      }
    };

    const stateNames = Object.keys(states);
    const statusMessages = {
      'idle': '...',
      'working': 'Working hard! 💪',
      'thinking': 'Hmm... 🤔',
      'success': 'Yay! 🎉',
      'idle_long': 'Zzz... 💤',
      'error': 'Oops! 😢'
    };

    let currentStatus = 0;
    let frameIndex = 1;
    let frameInterval = null;
    let statusInterval = null;

    function changeStatus(newState) {
      if (frameInterval) clearInterval(frameInterval);

      const stateConfig = states[newState];
      petImage.src = stateConfig.path + '1.svg';

      petImage.classList.remove('bounce', 'working', 'thinking');

      if (stateConfig.animClass) {
        petImage.classList.add(stateConfig.animClass);
      }

      frameIndex = 1;
      frameInterval = setInterval(() => {
        frameIndex = (frameIndex % stateConfig.frames) + 1;
        petImage.src = stateConfig.path + frameIndex + '.svg';
      }, stateConfig.duration);

      message.textContent = statusMessages[newState];
      message.classList.add('show');

      setTimeout(() => message.classList.remove('show'), 2000);

      console.log('状态切换:', newState, '帧:', frameIndex, '/', stateConfig.frames);
    }

    changeStatus('idle');

    statusInterval = setInterval(() => {
      currentStatus = (currentStatus + 1) % stateNames.length;
      changeStatus(stateNames[currentStatus]);
    }, 4000);

    document.getElementById('pet-container').addEventListener('click', () => {
      message.textContent = '❤️ Love you!';
      message.classList.add('show');

      setTimeout(() => {
        message.textContent = statusMessages[stateNames[currentStatus]];
        message.classList.remove('show');
      }, 1500);
    });

    document.getElementById('pet-container').addEventListener('contextmenu', (e) => {
      e.preventDefault();

      const menu = document.createElement('div');
      menu.style.cssText = `
        position: fixed;
        background: white;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 6px 25px rgba(0,0,0,0.15);
        z-index: 1001;
        font-size: 15px;
      `;

      const items = ['隐藏宠物', '显示宠物', '退出'];
      items.forEach(item => {
        const menuItem = document.createElement('div');
        menuItem.textContent = item;
        menuItem.style.cssText = `
          padding: 8px 16px;
          cursor: pointer;
          border-radius: 6px;
          margin: 4px 0;
        `;
        menuItem.addEventListener('mouseover', () => {
          menuItem.style.background = '#f0f0f0';
        });
        menuItem.addEventListener('mouseout', () => {
          menuItem.style.background = 'transparent';
        });
        menuItem.addEventListener('click', () => {
          if (item === '退出') {
            message.textContent = 'Bye! 👋';
            menu.remove();
          } else {
            message.textContent = item + '...';
            message.classList.add('show');
            setTimeout(() => {
              message.textContent = statusMessages[stateNames[currentStatus]];
              message.classList.remove('show');
            }, 1000);
          }
          menu.remove();
        });
        menu.appendChild(menuItem);
      });

      menu.style.left = e.clientX + 'px';
      menu.style.top = e.clientY + 'px';
      document.body.appendChild(menu);

      setTimeout(() => {
        document.addEventListener('click', function removeMenu() {
          menu.remove();
          document.removeEventListener('click', removeMenu);
        });
      }, 0);
    });

    console.log('🦊 增强版电子宠物准备就绪！');
  </script>
</body>
</html>
