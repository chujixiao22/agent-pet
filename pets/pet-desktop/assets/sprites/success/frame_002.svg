      <!-- 右眼高光 -->
      <circle cx="118" cy="93" r="2" fill="#FFFFFF"/>
    
  

      <!-- 鼻子 -->
      
    <ellipse cx="100" cy="110" rx="6" ry="5" fill="#FF6B6B" transform="scale(1.0564642473395036)"/>
  

