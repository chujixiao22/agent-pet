<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- 背景：透明 -->
      <rect width="200" height="200" fill="none"/>

      <!-- 身体 - 根据状态调整 -->
      
    <ellipse cx="100" cy="110" rx="60" ry="55" fill="#FF8C42" transform="scale(1.043301270189222)"/>
    <ellipse cx="100" cy="115" rx="50" ry="40" fill="#E67E22" transform="scale(1.043301270189222)"/>
  

      <!-- 肚子 -->
      
    <ellipse cx="100" cy="125" rx="40" ry="30" fill="#FFE4B5" transform="scale(1.025980762113533)"/>
  

      <!-- 耳朵 -->
      
    <!-- 左耳 -->
    <ellipse cx="55" cy="60" rx="18" ry="25" fill="#FF8C42"
            transform="rotate(-6.339745962155613deg, 55, 70)"/>
    <ellipse cx="55" cy="63" rx="10" ry="15" fill="#FFB6C1"
            transform="rotate(-6.339745962155613deg, 55, 70)"/>

    <!-- 右耳 -->
