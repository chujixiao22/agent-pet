    <ellipse cx="130" cy="115" rx="8" ry="5" fill="#FFB347" opacity="0.8682941969615793"/>
  

      <!-- 嘴巴 -->
      <path d="M 92 118 Q 100 116 108 118" stroke="#8B7355" stroke-width="2" fill="none"/>

      <!-- 胡须 -->
      
