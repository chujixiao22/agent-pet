<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Tooltip</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 360px;
      background: transparent;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
    }

    #tooltip {
      width: 360px;
      max-width: 360px;
      background: rgba(18, 18, 18, 0.96);
      color: #f0f0f0;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.45;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }

    .tooltip-meta {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      row-gap: 8px;
      column-gap: 14px;
      align-items: baseline;
    }

    .tooltip-label {
      color: rgba(255, 255, 255, 0.48);
      font-weight: 400;
      text-transform: lowercase;
    }

    .tooltip-value {
      color: #f7f7f7;
      font-weight: 400;
      overflow-wrap: anywhere;
    }

    .tooltip-path,
    .tooltip-date {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }

    .tooltip-prompt {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <div id="tooltip">
    <div class="tooltip-meta">
      <div class="tooltip-label">cwd</div>
      <div class="tooltip-value tooltip-path" id="cwd"></div>
      <div class="tooltip-label">启动</div>
      <div class="tooltip-value tooltip-date" id="started"></div>
    </div>
    <div class="tooltip-prompt" id="prompt"></div>
  </div>

  <script>
    const tooltip = document.getElementById('tooltip');
    const cwd = document.getElementById('cwd');
    const started = document.getElementById('started');
    const prompt = document.getElementById('prompt');
    let currentKey = '';

    function reportSize() {
      const rect = tooltip.getBoundingClientRect();
      window.tooltipAPI.reportSize({
        key: currentKey,
        width: Math.ceil(rect.width),
        height: Math.ceil(rect.height)
      });
    }

    window.tooltipAPI.onData((data) => {
      currentKey = data.key || '';
      cwd.textContent = data.cwd || '(无)';
      started.textContent = data.startedAt || '(无)';
      prompt.textContent = data.prompt || '';
      requestAnimationFrame(reportSize);
      setTimeout(reportSize, 0);
    });
  </script>
</body>
</html>
