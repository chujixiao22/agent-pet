<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Pet</title>
  <style>
    :root {
      /* Light theme (default) */
      --task-panel-bg: rgba(240, 240, 240, 0.95);
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --indicator-working: #4FC3F7;
      --indicator-completed: #66BB6A;
      --indicator-interrupted: #EF5350;
      --indicator-waiting: #FFC107;
      --task-working-bg-1: rgba(79, 195, 247, 0.15);
      --task-working-bg-2: rgba(79, 195, 247, 0.3);
      --task-completed-bg: rgba(102, 187, 106, 0.2);
      --task-waiting-bg-1: rgba(255, 193, 7, 0.2);
      --task-waiting-bg-2: rgba(255, 193, 7, 0.35);
      --task-interrupted-bg: rgba(239, 83, 80, 0.2);
      --task-summary-completed: rgba(102, 187, 106, 0.7);
      --task-badge-bg: rgba(255, 255, 255, 0.1);
    }

    [data-theme="dark"] {
      /* Dark theme */
      --task-panel-bg: rgba(30, 30, 30, 0.9);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --indicator-working: #4FC3F7;
      --indicator-completed: #66BB6A;
      --indicator-interrupted: #EF5350;
      --indicator-waiting: #FFC107;
      --task-working-bg-1: rgba(79, 195, 247, 0.15);
      --task-working-bg-2: rgba(79, 195, 247, 0.3);
      --task-completed-bg: rgba(102, 187, 106, 0.2);
      --task-waiting-bg-1: rgba(255, 193, 7, 0.2);
      --task-waiting-bg-2: rgba(255, 193, 7, 0.35);
      --task-interrupted-bg: rgba(239, 83, 80, 0.2);
      --task-summary-completed: rgba(102, 187, 106, 0.7);
      --task-badge-bg: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 200px;
      min-height: 200px;
      height: auto;
      overflow: hidden;
      background: transparent;
      cursor: move;
      user-select: none;
    }

    #pet-container {
      width: 100%;
      height: 132px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    #pet-sprite {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      position: absolute;
      transition: transform 0.1s ease;
    }

    /* Floating animation */
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    /* Bounce animation */
    @keyframes bounce {
      0%, 100% {
        transform: translateY(0px) scaleY(1);
      }
      25% {
        transform: translateY(-20px) scaleY(1.1);
      }
      50% {
        transform: translateY(0px) scaleY(0.9);
      }
      75% {
        transform: translateY(-10px) scaleY(1.05);
      }
    }

    /* Click effect */
    @keyframes click-effect {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    /* Pulsing dot animation */
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    .floating {
      animation: float 3s ease-in-out infinite;
    }

    .bouncing {
      animation: bounce 0.5s ease-in-out;
    }

    .click-effect {
      animation: click-effect 0.3s ease-in-out;
    }

    /* Task panel */
    #task-panel {
      display: none;
      flex-direction: column;
      gap: 2px;
      padding: 4px;
      background: var(--task-panel-bg);
      border-radius: 10px;
    }

    #task-panel.visible {
      display: flex;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      position: relative;
      cursor: pointer;
      min-height: 36px;
    }

    .task-item.working {
      background: linear-gradient(
        -45deg,
        var(--task-working-bg-1) 25%,
        var(--task-working-bg-2) 25%,
        var(--task-working-bg-2) 50%,
        var(--task-working-bg-1) 50%,
        var(--task-working-bg-1) 75%,
        var(--task-working-bg-2) 75%
      );
      background-size: 20px 20px;
      animation: progress-stripe 1s linear infinite;
    }

    @keyframes progress-stripe {
      0% { background-position: 0 0; }
      100% { background-position: 20px 0; }
    }

    .task-item.completed {
      background: var(--task-completed-bg);
    }

    .task-item.waiting {
      background: var(--task-waiting-bg-1);
      animation: waiting-pulse 2s ease-in-out infinite;
    }

    .task-item.interrupted {
      background: var(--task-interrupted-bg);
    }

    .task-item.thinking {
      background: linear-gradient(
        -45deg,
        var(--task-working-bg-1) 25%,
        var(--task-working-bg-2) 25%,
        var(--task-working-bg-2) 50%,
        var(--task-working-bg-1) 50%,
        var(--task-working-bg-1) 75%,
        var(--task-working-bg-2) 75%
      );
      background-size: 20px 20px;
      animation: progress-stripe 1s linear infinite;
    }

    .task-item.idle {
      background: var(--task-waiting-bg-1);
    }

    @keyframes waiting-pulse {
      0%, 100% { background-color: var(--task-waiting-bg-1); }
      50% { background-color: var(--task-waiting-bg-2); }
    }

    .task-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-item.working .task-indicator {
      background: var(--indicator-working);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .task-item.thinking .task-indicator {
      background: var(--indicator-working);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .task-item.idle .task-indicator {
      background: var(--indicator-waiting);
    }

    .task-item.completed .task-indicator {
      background: var(--indicator-completed);
    }

    .task-item.interrupted .task-indicator {
      background: var(--indicator-interrupted);
    }

    .task-item.waiting .task-indicator {
      background: var(--indicator-waiting);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .task-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .task-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .task-project {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-badge {
      color: var(--text-secondary);
      font-size: 12px;
      background: var(--task-badge-bg);
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .kill-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border: none;
      border-radius: 4px;
      background: rgba(239, 83, 80, 0.5);
      color: #EF5350;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .kill-btn:hover {
      background: rgba(239, 83, 80, 0.8);
    }

    .task-summary {
      color: var(--text-secondary);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-item.completed .task-summary {
      color: var(--task-summary-completed);
    }

    .task-dismiss {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      position: absolute;
      right: 4px;
      top: 4px;
    }

    .task-dismiss:hover {
      color: var(--text-primary);
    }

    .add-row {
      display: flex;
      justify-content: center;
      padding: 8px;
      min-height: 36px;
      align-items: center;
    }

    .add-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(79, 195, 247, 0.4);
      border: 2px solid rgba(79, 195, 247, 0.6);
      color: #4FC3F7;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .add-btn:hover {
      background: rgba(79, 195, 247, 0.6);
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <img id="pet-sprite" src="" alt="Pet">
  </div>
  <div id="task-panel"></div>

  <script src="renderer.js"></script>
</body>
</html>
