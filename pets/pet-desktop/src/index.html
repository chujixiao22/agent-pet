<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Pet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 200px;
      min-height: 200px;
      height: auto;
      overflow: hidden;
      background: transparent;
      cursor: move;
      user-select: none;
    }

    #pet-container {
      width: 100%;
      height: 132px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    #pet-sprite {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      position: absolute;
      transition: transform 0.1s ease;
    }

    /* Floating animation */
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    /* Bounce animation */
    @keyframes bounce {
      0%, 100% {
        transform: translateY(0px) scaleY(1);
      }
      25% {
        transform: translateY(-20px) scaleY(1.1);
      }
      50% {
        transform: translateY(0px) scaleY(0.9);
      }
      75% {
        transform: translateY(-10px) scaleY(1.05);
      }
    }

    /* Click effect */
    @keyframes click-effect {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    /* Pulsing dot animation */
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    .floating {
      animation: float 3s ease-in-out infinite;
    }

    .bouncing {
      animation: bounce 0.5s ease-in-out;
    }

    .click-effect {
      animation: click-effect 0.3s ease-in-out;
    }

    /* Task panel */
    #task-panel {
      display: none;
      flex-direction: column;
      gap: 2px;
      padding: 4px;
      background: rgba(30, 30, 30, 0.9);
      border-radius: 10px;
    }

    #task-panel.visible {
      display: flex;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 4px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      line-height: 1.3;
      position: relative;
      cursor: pointer;
    }

    .task-item.working {
      background: linear-gradient(
        -45deg,
        rgba(79, 195, 247, 0.15) 25%,
        rgba(79, 195, 247, 0.3) 25%,
        rgba(79, 195, 247, 0.3) 50%,
        rgba(79, 195, 247, 0.15) 50%,
        rgba(79, 195, 247, 0.15) 75%,
        rgba(79, 195, 247, 0.3) 75%
      );
      background-size: 20px 20px;
      animation: progress-stripe 1s linear infinite;
    }

    @keyframes progress-stripe {
      0% { background-position: 0 0; }
      100% { background-position: 20px 0; }
    }

    .task-item.completed {
      background: rgba(102, 187, 106, 0.2);
    }

    .task-item.waiting {
      background: rgba(255, 193, 7, 0.2);
      animation: waiting-pulse 2s ease-in-out infinite;
    }

    .task-item.interrupted {
      background: rgba(239, 83, 80, 0.2);
    }

    @keyframes waiting-pulse {
      0%, 100% { background-color: rgba(255, 193, 7, 0.2); }
      50% { background-color: rgba(255, 193, 7, 0.35); }
    }

    .task-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .task-item.working .task-indicator {
      background: #4FC3F7;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .task-item.completed .task-indicator {
      background: #66BB6A;
    }

    .task-item.interrupted .task-indicator {
      background: #EF5350;
    }

    .task-item.waiting .task-indicator {
      background: #FFC107;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .task-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .task-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .task-project {
      color: #ffffff;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-badge {
      color: rgba(255, 255, 255, 0.5);
      font-size: 10px;
      background: rgba(255, 255, 255, 0.1);
      padding: 0 4px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .task-summary {
      color: rgba(255, 255, 255, 0.6);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-item.completed .task-summary {
      color: rgba(102, 187, 106, 0.7);
    }

    .task-dismiss {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      position: absolute;
      right: 4px;
      top: 4px;
    }

    .task-dismiss:hover {
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <img id="pet-sprite" src="" alt="Pet">
  </div>
  <div id="task-panel"></div>

  <script src="renderer.js"></script>
</body>
</html>
