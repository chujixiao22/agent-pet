<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
    }
    #terminal {
      width: 100%;
      height: 100%;
      padding: 10px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #input-line {
      display: flex;
      padding: 5px 10px;
      background: #2d2d2d;
    }
    #prompt {
      color: #569cd6;
      margin-right: 8px;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: #d4d4d4;
      font-family: inherit;
      font-size: inherit;
      outline: none;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="input-line">
    <span id="prompt">$</span>
    <input id="input" type="text" autofocus>
  </div>
  <script src="terminal.js"></script>
</body>
</html>
