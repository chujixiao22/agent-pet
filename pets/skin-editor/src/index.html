<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Skin Editor</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">Skin Editor</h1>
      <div class="header-actions">
        <button id="btn-load-skin" class="btn btn-primary">Load Skin</button>
        <button id="btn-new-skin" class="btn btn-secondary">New Skin</button>
        <button id="btn-export" class="btn btn-primary" disabled>Export</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Left Panel: State List & Skin Info -->
      <aside class="left-panel">
        <section class="panel-section">
          <h2 class="panel-title">States</h2>
          <div id="state-list" class="state-list">
            <div class="state-item active" data-state="idle">
              <span class="state-indicator"></span>
              <span class="state-name">idle</span>
              <span class="state-frame-count">0 frames</span>
            </div>
            <div class="state-item" data-state="idle_long">
              <span class="state-indicator"></span>
              <span class="state-name">idle_long</span>
              <span class="state-frame-count">0 frames</span>
            </div>
            <div class="state-item" data-state="working">
              <span class="state-indicator"></span>
              <span class="state-name">working</span>
              <span class="state-frame-count">0 frames</span>
            </div>
            <div class="state-item" data-state="thinking">
              <span class="state-indicator"></span>
              <span class="state-name">thinking</span>
              <span class="state-frame-count">0 frames</span>
            </div>
            <div class="state-item" data-state="success">
              <span class="state-indicator"></span>
              <span class="state-name">success</span>
              <span class="state-frame-count">0 frames</span>
            </div>
            <div class="state-item" data-state="error">
              <span class="state-indicator"></span>
              <span class="state-name">error</span>
              <span class="state-frame-count">0 frames</span>
            </div>
          </div>
        </section>

        <section class="panel-section">
          <h2 class="panel-title">Skin Info</h2>
          <div class="form-group">
            <label for="skin-name">Name</label>
            <input type="text" id="skin-name" class="form-input" placeholder="skin-name" value="untitled">
          </div>
          <div class="form-group">
            <label for="skin-display-name">Display Name</label>
            <input type="text" id="skin-display-name" class="form-input" placeholder="Display Name" value="">
          </div>
          <div class="form-group">
            <label for="skin-author">Author</label>
            <input type="text" id="skin-author" class="form-input" placeholder="Author" value="">
          </div>
          <div class="form-group">
            <label for="skin-version">Version</label>
            <input type="text" id="skin-version" class="form-input" placeholder="1.0.0" value="1.0.0">
          </div>
        </section>
      </aside>

      <!-- Center Panel: Preview & Timeline -->
      <section class="center-panel">
        <div class="preview-container">
          <canvas id="preview-canvas" width="200" height="200"></canvas>
          <div class="preview-overlay" id="preview-empty">
            <span>Select a state to preview</span>
          </div>
        </div>

        <div class="timeline-container">
          <h2 class="panel-title">Timeline</h2>
          <div id="frame-strip" class="frame-strip">
            <!-- Frame thumbnails will be inserted here -->
          </div>
          <div class="timeline-controls">
            <button id="btn-prev-frame" class="btn btn-icon" disabled>
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button id="btn-play" class="btn btn-icon" disabled>
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
            </button>
            <button id="btn-pause" class="btn btn-icon" disabled style="display:none;">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button id="btn-stop" class="btn btn-icon" disabled>
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 6h12v12H6z"/></svg>
            </button>
            <button id="btn-next-frame" class="btn btn-icon" disabled>
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
            <div class="frame-indicator">
              <span id="current-frame">0</span> / <span id="total-frames">0</span>
            </div>
          </div>
        </div>

        <div class="controls-container">
          <div class="control-row">
            <div class="control-group">
              <label for="fps-input">FPS</label>
              <input type="number" id="fps-input" class="form-input form-input-small" min="1" max="60" value="10">
            </div>
            <div class="control-group">
              <label>
                <input type="checkbox" id="loop-checkbox" checked>
                Loop
              </label>
            </div>
          </div>
          <div class="control-row">
            <button id="btn-add-frame" class="btn btn-secondary" disabled>Add Frame</button>
            <button id="btn-delete-frame" class="btn btn-danger" disabled>Delete Frame</button>
            <button id="btn-replace-frame" class="btn btn-secondary" disabled>Replace Frame</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Status Bar -->
    <footer class="app-status">
      <span id="status-message">Ready</span>
      <span id="status-skin-name">No skin loaded</span>
    </footer>
  </div>

  <!-- Hidden file inputs -->
  <input type="file" id="file-input-svg" accept=".svg" style="display:none;">
  <input type="file" id="file-input-zip" accept=".zip" style="display:none;">

  <script src="renderer/app.js" type="module"></script>
</body>
</html>
